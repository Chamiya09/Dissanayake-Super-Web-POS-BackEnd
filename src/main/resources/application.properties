spring.application.name=web-pos-backend

# ===== Server =====
server.port=8080

# ===== DataSource (NeonDB PostgreSQL) =====
spring.datasource.url=jdbc:postgresql://ep-steep-truth-a1e4p63n-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_mIk0JzNYxD3n
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== JWT =====
# CHANGE this secret before deploying to production.
# Must be a Base64-encoded string representing >= 256 bits (32 bytes).
app.jwt.secret=RGlzc2FuYXlha2VTdXBlclBPU0p3dFNlY3JldDIwMjYhIQ==
# Token lifetime: 24 hours (milliseconds)
app.jwt.expiration-ms=86400000

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.url=jdbc:postgresql://ep-steep-truth-a1e4p63n-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
spring.flyway.user=neondb_owner
spring.flyway.password=npg_mIk0JzNYxD3n
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
# Suppress checksum validation — V7 was edited locally after being applied to
# the remote DB. Set back to true once flyway:repair has been run against NeonDB.
spring.flyway.validate-on-migrate=false

# ===== Mail (Gmail SMTP) =====
# Override with env-vars in production:
#   MAIL_USERNAME  -> your Gmail address
#   MAIL_APP_PASSWORD -> 16-char App Password (not your login password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:dissanayakesupers.orders@gmail.com}
spring.mail.password=${MAIL_APP_PASSWORD:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Display name shown in From: header
app.mail.sender-display-name=Dissanayake Super \u2013 Orders
