spring.application.name=web-pos-backend

# ===== Server =====
server.port=${SERVER_PORT:8080}

# ===== DataSource (NeonDB PostgreSQL) =====
spring.datasource.url=${DB_URL:jdbc:postgresql://ep-steep-truth-a1e4p63n-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
spring.datasource.username=${DB_USERNAME:neondb_owner}
spring.datasource.password=${DB_PASSWORD:npg_mIk0JzNYxD3n}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== JWT =====
# CHANGE this secret before deploying to production.
# Must be a Base64-encoded string representing >= 256 bits (32 bytes).
app.jwt.secret=RGlzc2FuYXlha2VTdXBlclBPU0p3dFNlY3JldDIwMjYhIQ==
# Token lifetime: 24 hours (milliseconds)
app.jwt.expiration-ms=86400000

# ===== Error Handling =====
server.error.include-message=always
server.error.include-binding-errors=always

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.url=${FLYWAY_URL:${spring.datasource.url}}
spring.flyway.user=${FLYWAY_USER:${spring.datasource.username}}
spring.flyway.password=${FLYWAY_PASSWORD:${spring.datasource.password}}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
# Suppress checksum validation — V7 was edited locally after being applied to
# the remote DB. Set back to true once flyway:repair has been run against NeonDB.
spring.flyway.validate-on-migrate=false

# ===== Mail (Gmail SMTP) =====
# Override with env-vars in production:
#   MAIL_USERNAME  -> your Gmail address
#   MAIL_APP_PASSWORD -> 16-char App Password (not your login password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:dissanayakasuperorder@gmail.com}
spring.mail.password=${MAIL_APP_PASSWORD:fpgkwiluyfacdrgs}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.test-connection=false

# Display name shown in From: header
app.mail.sender-display-name=Dissanayake Super \u2013 Orders
# IMAP settings used by Mail Box page to read real Gmail Inbox/Sent messages
app.mail.imap.host=${MAIL_IMAP_HOST:imap.gmail.com}
app.mail.imap.port=${MAIL_IMAP_PORT:993}
# Admin email for internal purchase-order alerts
app.admin.email=${ADMIN_EMAIL:dissanayakasuperorder@gmail.com}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://localhost:3000,http://192.168.*:5173,http://192.168.*:3000,http://10.*.*.*:5173,http://10.*.*.*:3000,http://172.16.*.*:5173,http://172.16.*.*:3000}

# Public supplier action URL used in reorder emails.
# The token is appended as a query parameter, e.g. ?token=<uuid>.
app.reorder.accept-url-base=${REORDER_ACCEPT_URL_BASE:http://localhost:8080/api/v1/reorder/accept}
